## WARNING: This is a TEMPLATE. Replace placeholder values before applying.
## Never commit real credentials to version control.
##
## Usage:
##   cp secret.yaml secret-local.yaml   # create a local copy
##   # edit secret-local.yaml with real values
##   kubectl apply -f secret-local.yaml

---
apiVersion: v1
kind: Secret
metadata:
  name: lumitex-s3-credentials
  namespace: lumitex
type: Opaque
stringData:
  # ── S3/COS configuration (mounted as file at /etc/s3/s3_config.yaml) ──
  s3_config.yaml: |
    taskid: render_250304
    protocol: https
    region: ap-guangzhou
    bucket: <REPLACE_WITH_BUCKET_NAME>
    cos_paths:
      prefix: "objaverse_xl"
      download_dir: "hf-objaverse-v1/glbs"
      upload_dir: "TextureGen_jingzhi"
      auth_file: "objaverse_xl/TextureGen_jingzhi/auth.txt"

  # ── AWS/COS credentials (boto3 reads from environment automatically) ──
  AWS_ACCESS_KEY_ID: "<REPLACE_ME>"
  AWS_SECRET_ACCESS_KEY: "<REPLACE_ME>"

---
apiVersion: v1
kind: Secret
metadata:
  name: lumitex-wandb-key
  namespace: lumitex
type: Opaque
stringData:
  WANDB_API_KEY: "<REPLACE_ME>"
