apiVersion: apps/v1
kind: Deployment
metadata:
  name: lumitex-redis
  namespace: lumitex
  labels:
    app: lumitex-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lumitex-redis
  template:
    metadata:
      labels:
        app: lumitex-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6666
          command: ["redis-server", "--port", "6666", "--appendonly", "yes", "--save", "60", "1"]
          resources:
            requests:
              cpu: "0.5"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          volumeMounts:
            - name: redis-data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "-p", "6666", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "-p", "6666", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: lumitex-redis-data

---
apiVersion: v1
kind: Service
metadata:
  name: lumitex-redis
  namespace: lumitex
spec:
  selector:
    app: lumitex-redis
  ports:
    - port: 6666
      targetPort: 6666

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lumitex-redis-data
  namespace: lumitex
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
